<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 저녁 뭐 먹지?</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <button id="theme-toggle">🌙 다크 모드</button>
  <h1>오늘 저녁 뭐 먹지?</h1>
  <button id="generate">메뉴 추천받기</button>
  <div id="food-result"></div>

  <hr style="width: 80%; margin: 50px 0; border: 0; border-top: 1px solid #ddd;">

  <section id="partnership">
    <h2>🤝 제휴 문의</h2>
    <form action="https://formspree.io/f/xpqogpza" method="POST">
      <div class="form-group">
        <label for="name">성함/업체명</label>
        <input type="text" id="name" name="name" required placeholder="성함 또는 업체명을 입력하세요">
      </div>
      <div class="form-group">
        <label for="email">이메일 주소</label>
        <input type="email" id="email" name="email" required placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" required placeholder="제휴 제안 내용을 입력해 주세요"></textarea>
      </div>
      <button type="submit" class="submit-btn">문의 보내기</button>
    </form>
  </section>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
