<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인공지능 동물상 테스트</title>
  <link href='/style.css' rel='stylesheet'>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <button id="theme-toggle">🌙 다크 모드</button>
  <h1>나의 동물상 테스트</h1>
  <p>카메라를 허용하고 '테스트 시작' 버튼을 눌러보세요!</p>
  
  <div id="test-container">
    <button type="button" id="start-btn" onclick="init()">테스트 시작</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
  </div>

  <hr style="width: 80%; margin: 50px 0; border: 0; border-top: 1px solid #ddd;">

  <section id="partnership">
    <h2>🤝 제휴 문의</h2>
    <form action="https://formspree.io/f/xpqogpza" method="POST">
      <div class="form-group">
        <label for="name">성함/업체명</label>
        <input type="text" id="name" name="name" required placeholder="성함 또는 업체명을 입력하세요">
      </div>
      <div class="form-group">
        <label for="email">이메일 주소</label>
        <input type="email" id="email" name="email" required placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" required placeholder="제휴 제안 내용을 입력해 주세요"></textarea>
      </div>
      <button type="submit" class="submit-btn">문의 보내기</button>
    </form>
  </section>

  <hr style="width: 80%; margin: 50px 0; border: 0; border-top: 1px solid #ddd;">

  <section id="comments" style="width: 90%; max-width: 800px; margin: 0 auto 100px auto;">
    <h2>💬 댓글</h2>
    <div id="disqus_thread"></div>
    <script>
        /**
        *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
        *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

        var disqus_config = function () {
        this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
        this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
        };
        */
        (function() { // DON'T EDIT BELOW THIS LINE
        var d = document, s = d.createElement('script');
        s.src = 'https://product-build-4.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
  </section>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
